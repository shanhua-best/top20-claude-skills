name: Daily Skills Update

on:
  schedule:
    # 每天北京时间 09:00 (CST = UTC+8, so 01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 允许手动触发
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-and-generate.js'
      - '.github/workflows/daily-update.yml'

# 确保 GitHub Pages 有写入权限
permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Fetch latest skills data & generate HTML
        run: node scripts/fetch-and-generate.js

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet index.html; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes — skipping commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected — will commit new data"
          fi

      - name: Commit & push updated index.html
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "📊 Daily update: skills data $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: update-data
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
          name: 'github-pages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
